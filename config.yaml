shell:
  - bash
  - -c

titles:
  items: "Environment"

env:
  sshUser: deploy
  region: eu-west-1

display:
  - name: default
    list: "{{.description}}"
    details: |
      ### {{.description}}

      | Field | Value |
      |---|---|
      | Cluster Name | `{{.clusterName}}` |
      | Cluster IP | `{{.clusterIp}}` |
      | Load Balancer | `{{.loadBalancerName}}` (`{{.loadBalancerIp}}`) |
      | SSH User | `{{.sshUser}}` |
      | Region | `{{.region}}` |

  - name: compact
    list: "{{.name}} ({{.clusterIp}})"
    details: |-
      ## {{.name}}

      **IP:** `{{.clusterIp}}`<br>
      **SSH:** `{{.sshUser}}@{{.clusterIp}}`

items:
  - name: Nightly CDM
    description: Nightly build CDM
    clusterIp: 10.20.30.40
    clusterName: test-cluster1
    loadBalancerIp: 11.20.30.40
    loadBalancerName: test-lb1
    # no action filter — sees all actions

  - name: Staging
    description: Staging build
    clusterIp: 20.20.30.40
    clusterName: test-cluster2
    loadBalancerIp: 21.20.30.40
    loadBalancerName: test-lb2
    # allow only specific action IDs
    actions: [print-template, print-env]

  - name: Production EU
    description: Production EU region
    clusterIp: 30.20.30.40
    clusterName: prod-cluster-eu
    loadBalancerIp: 31.20.30.40
    loadBalancerName: prod-lb-eu
    sshUser: root           # overrides global sshUser
    # allow only the "safe" group
    actionGroups: [safe]

  - name: Production US
    description: Production US region
    clusterIp: 40.20.30.40
    clusterName: prod-cluster-us
    loadBalancerIp: 41.20.30.40
    loadBalancerName: prod-lb-us
    region: us-east-1       # overrides global region
    # mix: a group + an extra action by ID + a custom inline action
    actionGroups: [safe]
    actions: [test-input]
    customActions:
      - title: US-only rollback
        cmd: echo "Rolling back {{.clusterName}} in {{.region}}"

  - name: Production APAC
    description: Production APAC region
    clusterIp: 50.20.30.40
    clusterName: prod-cluster-apac
    loadBalancerIp: 51.20.30.40
    loadBalancerName: prod-lb-apac
    region: ap-southeast-1  # overrides global region
    actionGroups: [safe]

  - name: QA Environment
    description: QA testing environment
    clusterIp: 60.20.30.40
    clusterName: qa-cluster1
    loadBalancerIp: 61.20.30.40
    loadBalancerName: qa-lb1

  - name: Dev Alpha
    description: Developer sandbox alpha
    display: compact
    clusterIp: 70.20.30.40
    clusterName: dev-cluster-alpha
    loadBalancerIp: 71.20.30.40
    loadBalancerName: dev-lb-alpha
    # custom actions only — no global actions
    customActions:
      - title: Deploy alpha build
        cmd: echo "Deploying to {{.clusterName}}"
      - title: Tail logs
        cmd: echo "Tailing logs on {{.clusterIp}}"

  - name: Dev Beta
    description: Developer sandbox beta
    display: compact
    clusterIp: 80.20.30.40
    clusterName: dev-cluster-beta
    loadBalancerIp: 81.20.30.40
    loadBalancerName: dev-lb-beta

  - name: Load Test
    description: Load testing cluster
    clusterIp: 90.20.30.40
    clusterName: loadtest-cluster1
    loadBalancerIp: 91.20.30.40
    loadBalancerName: loadtest-lb1

  - name: DR Failover
    description: Disaster recovery failover
    clusterIp: 100.20.30.40
    clusterName: dr-cluster1
    loadBalancerIp: 101.20.30.40
    loadBalancerName: dr-lb1
    actionGroups: [diagnostics]

actions:
  - id: print-template
    title: Print variables (template)
    description: "Echoes fields for {{.name}} ({{.clusterIp}}) via Go template syntax."
    groups: [safe, diagnostics]
    cmd: |
      echo "Item:     {{.name}}"
      echo "Cluster:  {{.clusterName}} ({{.clusterIp}})"
      echo "Region:   {{.region}}"
      echo "SSH user: {{.sshUser}}"

  - id: print-env
    title: Print variables (env vars)
    description: "Echoes fields for {{.name}} ({{.clusterIp}}) from environment variables."
    groups: [safe, diagnostics]
    cmd: |
      echo "Item:     $NAME"
      echo "Cluster:  $CLUSTERNAME ($CLUSTERIP)"
      echo "Region:   $REGION"
      echo "SSH user: $SSHUSER"

  - id: test-output
    groups: [diagnostics]
    title: Test output
    description: "Prints the hosts file on {{.name}} ({{.clusterIp}})."
    cmd: cat /etc/hosts

  - id: test-input
    title: Test input
    cmd: 'read -p "Enter something: " v && echo "You entered: $v"'

  - id: k9s
    title: Start k9s
    cmd: k9s --kubeconfig kubeconfig.yaml

  - id: open-browser
    title: Open UI in browser
    cmd: xdg-open http://localhost:8080
    noWait: true

  - id: system-info
    title: System info
    description: |
      Prints a snapshot of {{.name}} ({{.clusterIp}}):
        - Hostname and uptime
        - Disk, memory, and CPU summary
        - Network interfaces and current user
    cmd: |
      echo "=== Hostname ==="
      hostname
      echo ""
      echo "=== Uptime ==="
      uptime
      echo ""
      echo "=== Disk usage ==="
      df -h /
      echo ""
      echo "=== Memory ==="
      free -h
      echo ""
      echo "=== CPU ==="
      lscpu | grep -E "Model name|CPU\(s\)|Thread|Core"
      echo ""
      echo "=== Network interfaces ==="
      ip -brief address
      echo ""
      echo "=== Current user ==="
      id
